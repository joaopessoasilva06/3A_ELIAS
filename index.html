<!DOCTYPE html>
<html lang="PT-BR">
    <head>
        <title>FIREBASE</title>
        <style>
                body{
                    background-color:pink;
                }
                fieldset{
                    border:1px solid red;
                    width:200px;
                    height:600px;
                    margin-left:600px;
                    margin-top:50px;
                }
                legend{
                    color:red;
                }
                .texto{
                    color:red;
                }
                .campo{
                    border:1px solid red;
                }
            
        </style>
    </head>
    <body>
        <form>
            <fieldset>
                <legend>Cadastro no Bnaco de Dados</legend>
                <p class="texto">Nome:</p><input type="text" class="campo" placeholder="Digite o seu nome" maxlength="20" minlength="10" required><br>
                <p class="texto">Idade:</p><input type="text" class="campo" placeholder="Digite a sua idade" maxlength="20" minlength="10" required><br>
                <p class="texto">CEP:</p><input type="text" class="campo" placeholder="Digite o seu CEP" maxlength="20" minlength="10" required><br>
                <p class="texto">Telefone:</p><input type="text" class="campo" placeholder="Digite o seu telefone" maxlength="20" minlength="10" required><br>
                <p class="texto">Email:</p><input type="text" class="campo" placeholder="Digite o seu Email" maxlength="20" minlength="10" required><br>
                <p class="texto">Senha:</p><input type="text" class="campo" placeholder="Digite a sua senha" maxlength="20" minlength="10" required><br>
                <p class="texto">CPF:</p><input type="text" class="campo" placeholder="Digite o seu cpf" maxlength="20" minlength="10" required><br><br>
                <input type="submit" value="Cadastrar">
            </fieldset>
        </form>
    </body>
</html>
